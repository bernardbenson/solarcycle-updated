experiment_name: ablation_tcn
seed: 42
device: auto

# Data configuration
data:
  target_col: sunspot_number
  start_year: 1749
  input_window: 528
  prediction_horizon: 132
  add_features: false  # TCN uses raw data
  feature_window: 13
  normalization:
    method: robust
    transform: sqrt
    quantile_range: [25.0, 75.0]

# Model configuration
model:
  name: TCNOnly
  input_dim: 1
  d_model: 128
  output_size: 132
  tcn:
    num_blocks: 3
    layers_per_block: 4
    kernel_size: 3
    dropout: 0.1
  pooling: attention
  head: mse
  quantiles: [0.1, 0.5, 0.9]
  dropout: 0.1
  mc_dropout_samples: 30

# Training configuration  
training:
  epochs: 150
  batch_size: 32
  teacher_forcing: 0.0  # Not applicable for TCN
  teacher_forcing_decay: 0.95
  teacher_forcing_min: 0.1
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  warmup_epochs: 5
  scheduler_patience: 10
  scheduler_factor: 0.5
  early_stop_patience: 20
  grad_clip_norm: 1.0
  amp: false
  val_ratio: 0.2

# Cross-validation configuration
cv:
  enabled: true
  n_folds: 5
  test_size: 132
  min_train_size: 1000
  gap_size: 0
  method: rolling

# Output configuration
output_dir: data/experiments
save_predictions: true
save_model: true
log_interval: 10
plot_training: true
plot_predictions: true