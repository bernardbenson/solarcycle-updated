experiment_name: seq2seq_quantile
seed: 42
device: auto

# Data configuration
data:
  target_col: sunspot_number
  start_year: 1749
  input_window: 528
  prediction_horizon: 132
  add_features: true
  feature_window: 13
  normalization:
    method: robust
    transform: sqrt
    quantile_range: [25.0, 75.0]

# Model configuration
model:
  name: WaveNetAttnSeq2Seq
  input_dim: 1
  d_model: 128
  output_size: 132
  wavenet:
    stacks: 3
    layers_per_stack: 4
    kernel_size: 3
    base_dilation: 1
    channels: 128
    dropout: 0.2
  encoder_bilstm_hidden: 128
  decoder_lstm_hidden: 128
  attention: scaled_dot
  head: quantile
  quantiles: [0.1, 0.5, 0.9]
  dropout: 0.2
  mc_dropout_samples: 30

# Training configuration  
training:
  epochs: 200
  batch_size: 32
  teacher_forcing: 0.6
  teacher_forcing_decay: 0.95
  teacher_forcing_min: 0.1
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine_with_warmup
  warmup_epochs: 5
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stop_patience: 20
  grad_clip_norm: 1.0
  amp: false  # Set to false for better compatibility
  val_ratio: 0.2

# Cross-validation configuration
cv:
  enabled: true
  n_folds: 5
  test_size: 132
  min_train_size: 1000
  gap_size: 0
  method: rolling

# Output configuration
output_dir: data/experiments
save_predictions: true
save_model: true
log_interval: 10
plot_training: true
plot_predictions: true