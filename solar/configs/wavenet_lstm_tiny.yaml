# Tiny ablation of wavenet_lstm_v2 (~70K params: 16 channels, LSTM-64).
# If this matches the full model on leave-one-cycle-out RMSE, promote it -
# ~19-25 independent solar cycles argue for the smallest model that clears
# the baseline bar.

experiment_name: wavenet_lstm_tiny
seed: 42
device: auto

data:
  dataset: ssn
  target_col: sunspot_number
  start_year: 1749
  input_window: 528
  prediction_horizon: 132
  precursor_cols: []
  use_terminator: false
  normalization:
    method: minmax
    transform: identity

model:
  name: WaveNetLSTM
  head: quantile
  quantiles: [0.1, 0.5, 0.9]
  output_size: 132
  decoder_lstm_hidden: 64
  dropout: 0.3
  mc_dropout_samples: 30
  wavenet:
    channels: 16
    kernel_size: 2
    num_layers: 10
    norm: weight
    dropout: 0.25

training:
  epochs: 100
  batch_size: 32
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-3
  scheduler: warmup_cosine
  warmup_epochs: 5
  early_stop_patience: 10
  early_stop_metric: val_rmse_raw
  grad_clip_norm: 1.0
  use_ema: true
  ema_decay: 0.999
  val_ratio: 0.2
  val_stride: 12

output_dir: data/experiments
log_interval: 5
