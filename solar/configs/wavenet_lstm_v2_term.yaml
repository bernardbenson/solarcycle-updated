# Paper-faithful, modernized WaveNet+LSTM direct forecaster (Benson et al. 2020).
# 528-month (4-cycle) input -> 132-month (1-cycle) one-shot forecast.
#
# Key differences from the legacy seq2seq configs:
# - dilations double continuously to 512 (receptive field 1024 >= input window)
# - ~217K params (vs 2.46M), weight-norm instead of BatchNorm
# - min-max scaling on [0,1] (paper parity - no peak-compressing sqrt)
# - model selection on raw-unit validation RMSE, not scaled pinball loss
# - leak-free time-axis train/val split with disjoint targets

experiment_name: wavenet_lstm_v2_term
seed: 42
device: auto

data:
  dataset: ssn
  target_col: sunspot_number
  start_year: 1749            # full SILSO monthly record
  input_window: 528           # 4 cycles
  prediction_horizon: 132     # 1 cycle
  precursor_cols: []          # univariate (paper primary)
  use_terminator: true
  normalization:
    method: minmax
    transform: identity

model:
  name: WaveNetLSTM
  head: quantile
  quantiles: [0.1, 0.5, 0.9]
  output_size: 132
  decoder_lstm_hidden: 128    # LSTM summary size
  dropout: 0.3                # summary dropout
  mc_dropout_samples: 30
  wavenet:
    channels: 32
    kernel_size: 2
    num_layers: 10            # dilations 1..512, RF = 1024 months
    norm: weight
    dropout: 0.25

training:
  epochs: 100
  batch_size: 32
  optimizer: adamw
  lr: 5.0e-4                  # paper setting
  weight_decay: 1.0e-3
  scheduler: warmup_cosine    # smooth warmup -> single cosine (no restarts)
  warmup_epochs: 5
  early_stop_patience: 10
  early_stop_metric: val_rmse_raw
  grad_clip_norm: 1.0
  use_ema: true
  ema_decay: 0.999
  val_ratio: 0.2
  val_stride: 12

cv:
  enabled: true
  n_folds: 5
  test_size: 132
  method: rolling

output_dir: data/experiments
log_interval: 5
